version: '3.8'

services:
  dishy-db:
    image: postgres:16-alpine
    container_name: dishy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dishy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dishy-db-data:/var/lib/postgresql/data

  dishy-cache:
    image: redis:7-alpine
    container_name: dishy-redis
    ports:
      - "6379:6379"
    volumes:
      - dishy-cache-data:/data

volumes:
  dishy-db-data:
  dishy-cache-data: